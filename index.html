<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사진열람</title>
<style>
  @font-face {
    font-family: 'DoHee';
    src: url('./fonts/dohee.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #141414;
    --surface: #1e1414;
    --accent: #f4a7b9;
    --accent2: #c47a8a;
    --text: #f4a7b9;
    --text2: #c47a8a;
    --text3: #7a5060;
    --text4: #5a3a4a;
    --border: #2a1a1a;
    --card-bg: #1e1414;
    --hover: #2a1a2a;
  }

  body.light {
    --bg: #fde8ef;
    --surface: #fff0f4;
    --accent: #c06080;
    --accent2: #b06070;
    --text: #3a2030;
    --text2: #906070;
    --text3: #c090a0;
    --text4: #c090a0;
    --border: #f0c0d0;
    --card-bg: #fff0f4;
    --hover: #f5dce8;
  }

  body {
    font-family: 'DoHee', -apple-system, 'Apple SD Gothic Neo', sans-serif;
    font-size: 18px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* 헤더 */
  header {
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    transition: background 0.3s;
  }
  .logo { font-size: 17px; letter-spacing: 5px; color: var(--accent2); }
  .theme-btn {
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 15px;
    font-family: 'DoHee', sans-serif;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    transition: all 0.2s;
  }
  .theme-btn:hover { opacity: 0.75; }

  /* 최상위 카테고리 탭 */
  .cat-bar {
    padding: 20px 28px 0;
    border-bottom: 1px solid var(--border);
  }
  .cat-tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    padding: 8px 18px 14px;
    font-size: 17px;
    font-family: 'DoHee', sans-serif;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text3);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 1px;
    margin-bottom: -1px;
  }
  .cat-tab:hover { color: var(--text2); }
  .cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* 국내/해외 탭 */
  .region-bar { padding: 22px 28px 0; }
  .region-tabs { display: flex; gap: 6px; }
  .region-tab {
    padding: 6px 20px;
    border-radius: 100px;
    font-size: 16px;
    font-family: 'DoHee', sans-serif;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text3);
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .region-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* 본문 */
  .layout {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 28px 80px;
  }
  .section-label {
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--text3);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* 사진가 그리드 */
  .photographers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  /* 카드 */
  .photographer-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 20px 16px;
    transition: border-color 0.2s;
  }
  .photographer-card:hover { border-color: var(--text3); }
  .card-name { font-size: 17px; color: var(--text); margin-bottom: 4px; }
  .card-name-ko { font-size: 13px; color: var(--text3); margin-bottom: 16px; letter-spacing: 1px; }
  .card-desc { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 14px; }
  .card-links { display: flex; flex-direction: column; gap: 7px; }
  .card-link {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 14px;
    color: var(--text3);
    text-decoration: none;
    padding: 8px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .card-link:hover { color: var(--accent); border-color: var(--accent2); background: var(--hover); }
  .card-link.disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .link-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }
  .link-dot.muted { background: var(--text4); }
  .link-label { flex: 1; line-height: 1.3; }
  .link-tag { font-size: 11px; letter-spacing: 1px; color: var(--text4); white-space: nowrap; }
  .coming-tag {
    font-size: 10px; letter-spacing: 1px; color: var(--text4);
    padding: 2px 8px; border: 1px solid var(--border); border-radius: 100px;
  }

  .section-note {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text4);
    margin-bottom: 18px;
  }

  /* 준비 중 */
  .empty-section {
    padding: 60px 0;
    text-align: center;
    color: var(--text3);
    font-size: 16px;
    letter-spacing: 3px;
  }

  /* 모바일 */
  @media (max-width: 700px) {
    header { padding: 16px 18px; }
    .logo { font-size: 15px; letter-spacing: 4px; }
    .theme-btn { font-size: 13px; padding: 5px 12px; }

    .cat-bar { padding: 14px 18px 0; }
    .cat-tab { font-size: 15px; padding: 7px 12px 12px; }

    .region-bar { padding: 16px 18px 0; }
    .region-tabs { justify-content: flex-start; }
    .region-tab { font-size: 14px; padding: 5px 15px; }

    .layout { padding: 20px 18px 60px; }
    .section-label { font-size: 12px; }

    .photographers-grid { grid-template-columns: 1fr; gap: 10px; }
    .photographer-card { padding: 16px 16px 14px; }
    .card-name { font-size: 16px; }
    .card-name-ko { font-size: 12px; margin-bottom: 12px; }
    .card-link { font-size: 13px; padding: 7px 9px; }
    .link-tag { font-size: 10px; }
  }
</style>
</head>
<body class="light">

<header>
  <div class="logo">사진열람</div>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 어둡게</button>
</header>

<div class="cat-bar">
  <div class="cat-tabs">
    <button class="cat-tab active" onclick="setCat(this,'photographers')">사진가</button>
    <button class="cat-tab" onclick="setCat(this,'museums')">전문 미술관</button>
    <button class="cat-tab" onclick="setCat(this,'major-museums')">주요 미술관</button>
    <button class="cat-tab" onclick="setCat(this,'magazines')">잡지와 출판사</button>
    <button class="cat-tab" onclick="setCat(this,'awards')">상</button>
    <button class="cat-tab" onclick="setCat(this,'festivals')">축제</button>
    <button class="cat-tab" onclick="setCat(this,'photobooks')">사진집</button>
    <button class="cat-tab" onclick="setCat(this,'books')">책</button>
  </div>
</div>

<div id="photographers-section">
  <div class="region-bar">
    <div class="region-tabs">
      <button class="region-tab active" onclick="setRegion(this,'all')">전체</button>
      <button class="region-tab" onclick="setRegion(this,'international')">해외</button>
      <button class="region-tab" onclick="setRegion(this,'korea')">국내</button>
      <button class="region-tab" onclick="setRegion(this,'magnum')">매그넘</button>
    </div>
  </div>
  <div class="layout">
    <div class="section-label">PHOTOGRAPHERS</div>
    <div class="photographers-grid" id="photoGrid"></div>
  </div>
</div>

<div id="museums-section" style="display:none;">
  <div class="region-bar">
    <div class="region-tabs">
      <button class="region-tab active" onclick="setMuseumRegion(this,'all')">전체</button>
      <button class="region-tab" onclick="setMuseumRegion(this,'korea')">국내</button>
      <button class="region-tab" onclick="setMuseumRegion(this,'international')">해외</button>
    </div>
  </div>
  <div class="layout">
    <div class="section-label">MUSEUMS</div>
    <div class="photographers-grid" id="museumGrid"></div>
  </div>
</div>
<div id="major-museums-section" style="display:none;">
  <div class="region-bar">
    <div class="region-tabs">
      <button class="region-tab active" onclick="setMajorMuseumRegion(this,'all')">전체</button>
      <button class="region-tab" onclick="setMajorMuseumRegion(this,'international')">해외</button>
      <button class="region-tab" onclick="setMajorMuseumRegion(this,'korea')">국내</button>
    </div>
  </div>
  <div class="layout">
    <div class="section-label">MAJOR MUSEUMS</div>
    <div class="photographers-grid" id="majorMuseumGrid"></div>
  </div>
</div>

<div id="magazines-section" style="display:none;">
  <div class="region-bar">
    <div class="region-tabs">
      <button class="region-tab active" onclick="setMagazineRegion(this,'all')">전체</button>
      <button class="region-tab" onclick="setMagazineRegion(this,'international')">해외</button>
      <button class="region-tab" onclick="setMagazineRegion(this,'korea')">국내</button>
    </div>
  </div>
  <div class="layout">
    <div class="section-label">MAGAZINES</div>
    <div class="photographers-grid" id="magazineGrid"></div>
  </div>
</div>
<div id="awards-section" style="display:none;">
  <div class="layout"><div class="empty-section">— 준비 중 —</div></div>
</div>
<div id="festivals-section" style="display:none;">
  <div class="layout"><div class="empty-section">— 준비 중 —</div></div>
</div>

<div id="photobooks-section" style="display:none;">
  <div class="region-bar">
    <div class="region-tabs">
      <button class="region-tab active" onclick="setPhotobookRegion(this,'all')">전체</button>
      <button class="region-tab" onclick="setPhotobookRegion(this,'international')">해외</button>
      <button class="region-tab" onclick="setPhotobookRegion(this,'korea')">국내</button>
    </div>
  </div>
  <div class="layout">
    <div class="section-label">PHOTOBOOKS</div>
    <div class="section-note">구매 연결은 참고용입니다</div>
    <div class="photographers-grid" id="photobookGrid"></div>
  </div>
</div>

<div id="books-section" style="display:none;">
  <div class="region-bar">
    <div class="region-tabs">
      <button class="region-tab active" onclick="setBookRegion(this,'all')">전체</button>
      <button class="region-tab" onclick="setBookRegion(this,'international')">해외</button>
      <button class="region-tab" onclick="setBookRegion(this,'korea')">국내</button>
    </div>
  </div>
  <div class="layout">
    <div class="section-label">BOOKS</div>
    <div class="section-note">구매 연결은 참고용입니다</div>
    <div class="photographers-grid" id="bookGrid"></div>
  </div>
</div>

<script>
  const SECTIONS = ['photographers','museums','major-museums','magazines','awards','festivals','photobooks','books'];

  /* 테마 */
  const saved = localStorage.getItem('photography-theme') || 'light';
  document.body.className = saved;
  document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 밝게' : '🌙 어둡게';

  function toggleTheme() {
    const next = document.body.className === 'dark' ? 'light' : 'dark';
    document.body.className = next;
    localStorage.setItem('photography-theme', next);
    document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 밝게' : '🌙 어둡게';
  }

  /* 카테고리 */
  function setCat(el, cat) {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    SECTIONS.forEach(s => {
      document.getElementById(s + '-section').style.display = s === cat ? '' : 'none';
    });
  }

  /* 주요 미술관 데이터 */
  const MAJOR_MUSEUMS = [
    {
      name: "National Portrait Gallery",
      nameEn: "National Portrait Gallery · 1856 · London",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://www.npg.org.uk/", tag: "Website" },
      ]
    },
    {
      name: "Getty",
      nameEn: "J. Paul Getty Museum · 1954 · Los Angeles",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://www.getty.edu/", tag: "Website" },
      ]
    },
    {
      name: "MoMA",
      nameEn: "Museum of Modern Art · 1929 · New York",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://www.moma.org/", tag: "Website" },
      ]
    },
    {
      name: "The Met",
      nameEn: "Metropolitan Museum of Art · 1870 · New York",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://www.metmuseum.org/", tag: "Website" },
      ]
    },
  ];

  let currentMajorMuseumRegion = 'all';
  function setMajorMuseumRegion(el, region) {
    el.closest('.region-tabs').querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentMajorMuseumRegion = region;
    renderMajorMuseumGrid();
  }

  function renderMajorMuseumGrid() {
    const grid = document.getElementById('majorMuseumGrid');
    const list = currentMajorMuseumRegion === 'all'
      ? MAJOR_MUSEUMS
      : MAJOR_MUSEUMS.filter(m => m.region === currentMajorMuseumRegion);

    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-section">— 준비 중 —</div>';
      return;
    }

    grid.innerHTML = list.map(m => `
      <div class="photographer-card">
        <div class="card-name">${m.name}</div>
        <div class="card-name-ko">${m.nameEn}</div>
        <div class="card-links">
          ${m.links.map(l => `
            <a class="card-link${l.coming ? ' disabled' : ''}"
               href="${l.coming ? '#' : l.url}"
               ${l.coming ? '' : 'target="_blank" rel="noopener"'}>
              <span class="link-dot${l.coming ? ' muted' : ''}"></span>
              <span class="link-label">${l.label}</span>
              ${l.coming
                ? '<span class="coming-tag">준비 중</span>'
                : `<span class="link-tag">${l.tag} ↗</span>`}
            </a>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  /* 사진 잡지 데이터 */
  const MAGAZINES = [
    {
      name: "Aperture",
      nameKo: "1952 · USA",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://aperture.org/", tag: "Website" },
        { label: "Magazine", url: "https://aperture.org/magazine/", tag: "Magazine" },
      ]
    },
    {
      name: "British Journal of Photography",
      nameKo: "1854 · UK",
      region: "international",
      links: [
        { label: "1854.photography (공식 웹사이트)", url: "https://www.1854.photography/", tag: "Website" },
      ]
    },
    {
      name: "Foam Magazine",
      nameKo: "2001 · Netherlands",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://www.foam.org/foam-magazine", tag: "Website" },
      ]
    },
    {
      name: "GUP Magazine",
      nameKo: "Netherlands",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://www.gupnew.com/", tag: "Website" },
      ]
    },
    {
      name: "LensCulture",
      nameKo: "2004 · Online",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://www.lensculture.com/", tag: "Website" },
      ]
    },
    {
      name: "Steidl",
      nameKo: "1968 · Germany",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://steidl.de/", tag: "Website" },
        { label: "Photography Books", url: "https://steidl.de/Books/Photography-0104064348.html", tag: "Catalogue" },
      ]
    },
    {
      name: "보스토크 VOSTOK",
      nameKo: "2016 · 한국",
      region: "korea",
      links: [
        { label: "공식 웹사이트", url: "http://vostokpress.net/", tag: "Website" },
        { label: "Instagram @vostok_mag", url: "https://www.instagram.com/vostok_mag/", tag: "Instagram" },
      ]
    },
  ];

  let currentMagazineRegion = 'all';
  function setMagazineRegion(el, region) {
    el.closest('.region-tabs').querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentMagazineRegion = region;
    renderMagazineGrid();
  }

  function renderMagazineGrid() {
    const grid = document.getElementById('magazineGrid');
    const list = currentMagazineRegion === 'all'
      ? MAGAZINES
      : MAGAZINES.filter(m => m.region === currentMagazineRegion);

    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-section">— 준비 중 —</div>';
      return;
    }

    grid.innerHTML = list.map(m => `
      <div class="photographer-card">
        <div class="card-name">${m.name}</div>
        <div class="card-name-ko">${m.nameKo}</div>
        <div class="card-links">
          ${m.links.map(l => `
            <a class="card-link${l.coming ? ' disabled' : ''}"
               href="${l.coming ? '#' : l.url}"
               ${l.coming ? '' : 'target="_blank" rel="noopener"'}>
              <span class="link-dot${l.coming ? ' muted' : ''}"></span>
              <span class="link-label">${l.label}</span>
              ${l.coming
                ? '<span class="coming-tag">준비 중</span>'
                : `<span class="link-tag">${l.tag} ↗</span>`}
            </a>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  /* 사진 전문 미술관 데이터 */
  const MUSEUMS = [
    {
      name: "Fraenkel Gallery",
      nameEn: "1979 · San Francisco",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://fraenkelgallery.com/", tag: "Website" },
      ]
    },
    {
      name: "Center for Creative Photography",
      nameEn: "1975 · Tucson, USA",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://ccp.arizona.edu/", tag: "Website" },
      ]
    },
    {
      name: "George Eastman Museum",
      nameEn: "1947 · Rochester, USA",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://www.eastman.org/", tag: "Website" },
      ]
    },
    {
      name: "Hamiltons Gallery",
      nameEn: "1975 · London",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://www.hamiltonsgallery.com/", tag: "Website" },
      ]
    },
    {
      name: "Hasselblad Foundation",
      nameEn: "1979 · Gothenburg",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://www.hasselbladfoundation.org/", tag: "Website" },
      ]
    },
    {
      name: "Howard Greenberg Gallery",
      nameEn: "1981 · New York",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://www.howardgreenberg.com/", tag: "Website" },
      ]
    },
    {
      name: "International Center of Photography",
      nameEn: "ICP · 1974 · New York",
      region: "international",
      links: [
        { label: "공식 웹사이트", url: "https://www.icp.org/", tag: "Website" },
      ]
    },
    {
      name: "고은사진미술관",
      nameEn: "Goeun Museum of Photography",
      region: "korea",
      links: [
        { label: "공식 홈페이지", url: "https://www.goeunmuseum.kr/", tag: "Website" },
      ]
    },
    {
      name: "동강사진박물관",
      nameEn: "Donggang Museum of Photography",
      region: "korea",
      links: [
        { label: "공식 홈페이지", url: "https://www.dgphotomuseum.com/", tag: "Website" },
      ]
    },
    {
      name: "류가헌",
      nameEn: "Ryugaheon",
      region: "korea",
      links: [
        { label: "Instagram @ryugaheon", url: "https://www.instagram.com/ryugaheon/", tag: "Instagram" },
      ]
    },
    {
      name: "뮤지엄 한미",
      nameEn: "Museum Hanmi",
      region: "korea",
      links: [
        { label: "공식 홈페이지", url: "https://museumhanmi.or.kr/", tag: "Website" },
      ]
    },
    {
      name: "서울시립사진미술관",
      nameEn: "Seoul Museum of Photography",

  let currentMuseumRegion = 'all';
  function setMuseumRegion(el, region) {
    el.closest('.region-tabs').querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentMuseumRegion = region;
    renderMuseumGrid();
  }

  function renderMuseumGrid() {
    const grid = document.getElementById('museumGrid');
    const list = currentMuseumRegion === 'all'
      ? MUSEUMS
      : MUSEUMS.filter(m => m.region === currentMuseumRegion);

    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-section">— 준비 중 —</div>';
      return;
    }

    grid.innerHTML = list.map(m => `
      <div class="photographer-card">
        <div class="card-name">${m.name}</div>
        <div class="card-name-ko">${m.nameEn}</div>
        <div class="card-links">
          ${m.links.map(l => `
            <a class="card-link${l.coming ? ' disabled' : ''}"
               href="${l.coming ? '#' : l.url}"
               ${l.coming ? '' : 'target="_blank" rel="noopener"'}>
              <span class="link-dot${l.coming ? ' muted' : ''}"></span>
              <span class="link-label">${l.label}</span>
              ${l.coming
                ? '<span class="coming-tag">준비 중</span>'
                : `<span class="link-tag">${l.tag} ↗</span>`}
            </a>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  function setRegion(el, region) {
    el.closest('.region-tabs').querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentRegion = region;
    renderGrid();
  }

  function renderGrid() {    const grid = document.getElementById('photoGrid');
    const list = currentRegion === 'all'
      ? PHOTOGRAPHERS
      : currentRegion === 'magnum'
        ? PHOTOGRAPHERS.filter(p => p.magnum)
        : PHOTOGRAPHERS.filter(p => p.region === currentRegion);

    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-section">— 준비 중 —</div>';
      return;
    }

    grid.innerHTML = list.map(p => `
      <div class="photographer-card">
        <div class="card-name">${p.name}</div>
        <div class="card-name-ko">${p.nameKo}</div>
        <div class="card-links">
          ${p.links.map(l => `
            <a class="card-link${l.coming ? ' disabled' : ''}"
               href="${l.coming ? '#' : l.url}"
               ${l.coming ? '' : 'target="_blank" rel="noopener"'}>
              <span class="link-dot${l.coming ? ' muted' : ''}"></span>
              <span class="link-label">${l.label}</span>
              ${l.coming
                ? '<span class="coming-tag">준비 중</span>'
                : `<span class="link-tag">${l.tag} ↗</span>`}
            </a>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  let currentBookRegion = 'all';
  function setBookRegion(el, region) {
    el.closest('.region-tabs').querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentBookRegion = region;
    renderBookGrid();
  }

  function renderBookGrid() {
    const grid = document.getElementById('bookGrid');
    const list = currentBookRegion === 'all'
      ? BOOKS
      : BOOKS.filter(b => b.region === currentBookRegion);

    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-section">— 준비 중 —</div>';
      return;
    }

    grid.innerHTML = list.map(b => `
      <div class="photographer-card">
        <div class="card-name">${b.name}</div>
        <div class="card-name-ko">${b.nameKo}</div>
        ${b.desc ? `<div class="card-desc">${b.desc}</div>` : ''}
        <div class="card-links">
          ${b.links.map(l => `
            <a class="card-link${l.coming ? ' disabled' : ''}"
               href="${l.coming ? '#' : l.url}"
               ${l.coming ? '' : 'target="_blank" rel="noopener"'}>
              <span class="link-dot${l.coming ? ' muted' : ''}"></span>
              <span class="link-label">${l.label}</span>
              ${l.coming
                ? '<span class="coming-tag">준비 중</span>'
                : `<span class="link-tag">${l.tag} ↗</span>`}
            </a>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  renderGrid();
  renderMuseumGrid();
  renderMajorMuseumGrid();
  renderMagazineGrid();
  renderPhotobookGrid();
  renderBookGrid();
